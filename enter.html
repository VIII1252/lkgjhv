<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Задачник</title>
    <link rel="stylesheet" href="enter.css">
</head>
<body>

    <div class="background-glow glow-1"></div>
    <div class="background-glow glow-2"></div>

    <header class="topbar">
        <div class="logo">📘 Задачник</div>
        <nav>
            <a href="main.html">🏠 Главная</a>
            <a href="#">📚 Статьи</a>
            <a href="#">🧠 Задачи</a>
        </nav>
    </header>

    <main class="container">
        <div class="register-box">

            <div class="title-block">
                <span class="accent-line"></span>
                <h2>Вход</h2>
            </div>

            <p class="subtitle">
                С возвращением. Войдите в аккаунт чтобы продолжить обучение.
            </p>

            <form>
                <div class="input-group">
                    <label>Email или имя пользователя</label>
                    <input type="text" placeholder="Введите email или имя">
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="Введите пароль">
                </div>

                <button type="button" class="register-btn" onclick="window.location.href='main.html'">Войти</button>

                <div class="login-link">
                    Нет аккаунта?
                    <a href="login.html">Зарегистрироваться</a>
                </div>
            </form>

        </div>
    </main>

</body>
</html>
