<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="enter.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Задачник</title>
</head>
<body>
    
    <div class="container">
        <div class="register-box">
            <h2>Вход</h2>
            
            <form>
                <div class="input-group">
                    <label>Email или имя пользователя</label>
                    <input type="text" placeholder="Введите email или имя">
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" placeholder="Введите пароль">
                </div>

                <button type="submit" class="register-btn">Войти</button>

                <div class="login-link">
                    Нет аккаунта? <a href="login.html">Зарегистрироваться</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
